# See https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md

git:
  pagers:
    - pager: >-
        delta --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
    - pager: diff-so-fancy
    - pager: ydiff -p cat -s --wrap --width={{columnWidth}}
      colorArg: never
    - externalDiffCommand: difft --color=always
  overrideGpg: true # Ignore GPG errors as I'm using a GPG agent

os:
  editPreset: nvim-remote
  shellFunctionsFile: ~/.config/lazygit/env.sh

keybinding:
  files:
    openStatusFilter: "<c-p>"

gui:
  branchColorPatterns:
    '^main$': '#11aaff'
    '^master$': '#11aaff'
    '^develop$': '#11aaff'
    '^dev$': '#11aaff'
    '^staging$': '#11aaff'
    '^integration$': '#11aaff'
    '^wt/': 'yellow'
  showIcons: true

promptToReturnFromSubprocess: false # removes "press enter to return to lazygit" popup

customCommands:
  - key: 'T'
    command: 'tmux-worktree-open {{.SelectedWorktree.Path | quote}}'
    description: 'Open worktree tmux session'
    context: 'worktrees'
    output: terminal

  - key: '<c-d>'
    command: '[ -z "$NVIM" ] && (nvim -c DiffviewOpen) || (nvim --server "$NVIM" -c DiffviewOpen)'
    context: 'files'
    output: terminal
  - key: 'P'
    command: 'pbpaste | git apply -'
    description: 'Apply git patch from clipboard'
    context: 'files'
    output: log

  - key: 'C'
    command: 'git branch -r | sed "s/origin\///" | fzf --prompt="Select branch: " | xargs -I {} git checkout {}'
    context: 'localBranches'
    output: terminal
  - key: 'y'
    command: 'echo -n "{{.SelectedLocalBranch.Name}}" | pbcopy && echo "Copied: {{.SelectedLocalBranch.Name}}"'
    description: 'Copy branch name to clipboard'
    context: 'localBranches'
    output: log
  - key: "<c-r>"
    command: "git reset --hard @{upstream}"
    description: "Reset hard the local branch with its upstream"
    context: "localBranches"
    output: log

  - key: "<c-u>"
    command: "git reset --soft HEAD^"
    description: "Uncommit selected commit and put the changes back in the working tree"
    context: "commits"
    output: log

  # Blame via tig
  - key: b
    command: tig blame -- {{.SelectedFile.Name}}
    context: files
    description: blame file at tree
  - key: b
    command: tig blame {{.SelectedSubCommit.Sha}} -- {{.SelectedCommitFile.Name}}
    context: commitFiles
    description: blame file at revision
  - key: B
    command: tig blame -- {{.SelectedCommitFile.Name}}
    context: commitFiles
    description: blame file at tree

  # File history via tig
  - key: t
    command: tig {{.SelectedSubCommit.Sha}} -- {{.SelectedCommitFile.Name}}
    context: commitFiles
    description: tig file (history of commits affecting file)
  - key: t
    command: tig -- {{.SelectedFile.Name}}
    context: files
    description: tig file (history of commits affecting file)

  # Browse files at revision via tig
  - key: t
    command: tig show {{.SelectedSubCommit.Sha}}
    context: subCommits
    description: tig commit (`t` again to browse files at revision)
  - key: t
    command: tig show {{.SelectedLocalBranch.Name}}
    context: localBranches
    description: tig branch (`t` again to browse files at revision)
  - key: t
    command: tig show {{.SelectedRemoteBranch.RemoteName}}/{{.SelectedRemoteBranch.Name}}
    context: remoteBranches
    description: tig branch (`t` again to browse files at revision)
